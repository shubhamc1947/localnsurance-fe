<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary ─────────────────────────────────────────────────────── -->
    <title>Localsurance : Remote Health Insurance for Global Teams</title>
    <meta name="description" content="Localsurance provides comprehensive remote health insurance for distributed teams worldwide. Get covered in minutes — flexible plans for employers, employees, and remote workers across every region." />
    <meta name="keywords" content="remote health insurance, global health coverage, international health insurance, remote team benefits, employee health insurance, distributed team insurance, expat insurance, remote work benefits" />
    <meta name="author" content="Localsurance" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0066FF" />
    <link rel="canonical" href="https://localsurance.com/" />

    <!-- ── Favicon ──────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/x-icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp, Slack…) ───────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Localsurance" />
    <meta property="og:url"         content="https://localsurance.com/" />
    <meta property="og:title"       content="Localsurance – Remote Health Insurance for Global Teams" />
    <meta property="og:description" content="Comprehensive health insurance built for remote and distributed teams. Flexible plans, global coverage, and fast onboarding." />
    <meta property="og:image"       content="https://localsurance.com/og.png" />
    <meta property="og:image:type"  content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="Localsurance – Remote Health Insurance for Global Teams" />
    <meta property="og:locale"      content="en_US" />

    <!-- ── Twitter / X Card ────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@localsurance" />
    <meta name="twitter:creator"     content="@localsurance" />
    <meta name="twitter:title"       content="Localsurance – Remote Health Insurance for Global Teams" />
    <meta name="twitter:description" content="Comprehensive health insurance built for remote and distributed teams. Flexible plans, global coverage, and fast onboarding." />
    <meta name="twitter:image"       content="https://localsurance.com/og.png" />
    <meta name="twitter:image:alt"   content="Localsurance – Remote Health Insurance for Global Teams" />

    <!-- ── Mobile / PWA ────────────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable"    content="yes" />
    <meta name="apple-mobile-web-app-title"      content="Localsurance" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable"          content="yes" />
    <meta name="application-name"                content="Localsurance" />

    <!-- ── Geo / Business ──────────────────────────────────────────────── -->
    <meta name="geo.region"   content="US-CA" />
    <meta name="geo.placename" content="California" />

    <!-- ── Structured Data (JSON-LD) ───────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Localsurance",
      "url": "https://localsurance.com",
      "logo": "https://localsurance.com/og.png",
      "description": "Comprehensive remote health insurance for distributed teams worldwide.",
      "address": {
        "@type": "PostalAddress",
        "addressRegion": "CA",
        "addressCountry": "US"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "telephone": "+1-000-000-0000"
      },
      "sameAs": [
        "https://twitter.com/localsurance",
        "https://linkedin.com/company/localsurance"
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
